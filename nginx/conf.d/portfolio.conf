# sebasing.dev — Portfolio Web (Next.js)

server {
    listen 80;
    server_name sebasing.dev www.sebasing.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://portfolio-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- SSL (descomentar despues de ejecutar certbot) ---
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/sebasing.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sebasing.dev/privkey.pem;
    #
    # Para forzar HTTPS, reemplazar el bloque location / de arriba por:
    # location / {
    #     return 301 https://$host$request_uri;
    # }
    # Y mover el proxy_pass al bloque server con listen 443 ssl.
}

