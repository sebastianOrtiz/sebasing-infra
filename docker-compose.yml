services:
  # ============================================================
  # Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl/certbot/conf:/etc/letsencrypt:ro
      - ./ssl/certbot/www:/var/www/certbot:ro
    depends_on:
      portfolio-web:
        condition: service_healthy
      nexus-crm-api:
        condition: service_healthy
      nexus-crm-dashboard:
        condition: service_healthy
      event-api:
        condition: service_healthy
      search-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl/certbot/conf:/etc/letsencrypt
      - ./ssl/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  # ============================================================
  # Application Services
  # ============================================================
  portfolio-web:
    image: ghcr.io/sebastianortiz/portfolio-web:latest
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - frontend

  nexus-crm-api:
    image: ghcr.io/sebastianortiz/nexus-crm-api:latest
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVENT_SERVICE_URL: http://event-api:8081
      EVENT_SERVICE_API_KEY: ${EVENT_SERVICE_API_KEY}
      SEARCH_SERVICE_URL: http://search-api:8082
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  nexus-crm-dashboard:
    image: ghcr.io/sebastianortiz/nexus-crm-dashboard:latest
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend

  event-api:
    image: ghcr.io/sebastianortiz/event-driven-service:latest
    command: ["api"]
    expose:
      - "8081"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_KEY: ${EVENT_SERVICE_API_KEY}
      HTTP_PORT: "8081"
      DB_SCHEMA: events
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  event-workers:
    image: ghcr.io/sebastianortiz/event-driven-service:latest
    command: ["worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_KEY: ${EVENT_SERVICE_API_KEY}
      DB_SCHEMA: events
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  search-api:
    image: ghcr.io/sebastianortiz/semantic-search-api:latest
    expose:
      - "8082"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      DB_SCHEMA: search
      HTTP_PORT: "8082"
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # ============================================================
  # Infrastructure Services
  # ============================================================
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
